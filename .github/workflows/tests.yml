name: Build and Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build tests
        run: |
          cmake --build build --target all_tests

      - name: Run tests
        run: |
          ./build/tests/IIL_lexer_comparison_operators_test
          ./build/tests/IIL_lexer_arithmetic_operators_test
          ./build/tests/IIL_lexer_string_test
          ./build/tests/IIL_lexer_number_test
          ./build/tests/IIL_lexer_identifier_test
